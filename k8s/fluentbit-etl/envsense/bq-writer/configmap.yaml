apiVersion: v1
kind: ConfigMap
metadata:
  name: envsense-bq-config
  namespace: fluentbit-etl
data:
  fluent-bit.yaml: |
    service:
      flush: 5
      retry_limit: no_limit
      log_level: info

    pipeline:
      inputs:
        - name: kafka
          brokers: 192.168.30.24:9092,192.168.30.25:9092,192.168.30.26:9092,192.168.30.27:9092
          topics: envsensor-pr
          group_id: bqwriter-envsensor-pr
          format: json
          rdkafka.auto.offset.reset: earliest
          poll_ms: 1000

      filters:
        # Step 1: Lift sensor fields out of the Kafka payload envelope
        - name: nest
          match: "*"
          operation: lift
          nested_under: payload

        # Step 2: Strip Kafka metadata and leftover fields
        - name: record_modifier
          match: "*"
          remove_key:
            - topic
            - partition
            - offset
            - key
            - "@timestamp"
            - payload
            - error

        # Step 3: Serialize measurements object to JSON string
        # BigQuery JSON column type requires the value as a serialized string
        - name: lua
          match: "*"
          call: stringify_measurements
          code: |
            function stringify_measurements(tag, timestamp, record)
              local m = record["measurements"]
              if m ~= nil and type(m) == "table" then
                local parts = {}
                for k, v in pairs(m) do
                  if type(v) == "number" then
                    table.insert(parts, string.format('"%s":%s', k, tostring(v)))
                  else
                    table.insert(parts, string.format('"%s":"%s"', k, tostring(v)))
                  end
                end
                record["measurements"] = "{" .. table.concat(parts, ",") .. "}"
              end
              return 1, timestamp, record
            end

      outputs:
        - name: bigquery
          match: "*"
          project_id: cutlernet-datahub
          dataset_id: publicna2
          table_id: envsensor
          google_service_credentials: /gcp/credentials.json
          workers: 1