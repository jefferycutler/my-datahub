apiVersion: apps/v1
kind: Deployment
metadata:
  name: envsense-receiver
  namespace: fluentbit-etl
  labels:
    app: envsense-receiver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: envsense-receiver
  template:
    metadata:
      labels:
        app: envsense-receiver
    spec:
      nodeSelector:
        hardware: pi4
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:4.2.3
          args:
            - --config=/fluent-bit/etc/fluent-bit.yaml
          ports:
            - containerPort: 25000
              protocol: TCP
              name: sensor-ingest
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc/
          livenessProbe:
            tcpSocket:
              port: 25000
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: envsense-receiver-config