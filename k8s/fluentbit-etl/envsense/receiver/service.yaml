apiVersion: v1
kind: Service
metadata:
  name: envsense-receiver
  namespace: fluentbit-etl
  labels:
    app: envsense-receiver
spec:
  type: LoadBalancer          # Exposes port externally so edge devices can reach it
  selector:
    app: envsense-receiver
  ports:
    - name: sensor-ingest
      protocol: TCP
      port: 25000
      targetPort: 25000