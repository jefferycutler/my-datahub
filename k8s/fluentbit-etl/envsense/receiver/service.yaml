apiVersion: v1
kind: Service
metadata:
  name: envsense-receiver
  namespace: fluentbit-etl
  labels:
    app: envsense-receiver
spec:
  type: NodePort
  selector:
    app: envsense-receiver
  ports:
    - name: sensor-ingest
      protocol: TCP
      port: 25000        # ClusterIP port (internal)
      targetPort: 25000  # Container port
      nodePort: 30025    # Fixed NodePort — must match HAProxy backend