# k8s/charts/airflow/values.yaml
#
# Apache Airflow — Helm chart values
# Chart: apache-airflow/airflow version 1.22.0 (Airflow 3.2.2)
#
# External database: MariaDB HA pair via Keepalived VIP (192.168.30.15:3306).
#
# Pre-requisite Kubernetes secrets (create before helm install):
#
#   1. airflow-db-credentials
#      kubectl create secret generic airflow-db-credentials \
#        --namespace airflow \
#        --from-literal=connection='mysql+mysqldb://airflow:<pw>@192.168.30.15:3306/airflow'
#
#   2. airflow-fernet-key
#      kubectl create secret generic airflow-fernet-key \
#        --namespace airflow \
#        --from-literal=fernet-key='<generated-fernet-key>'
#
# Generate fernet key:
#   python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"

# ── Airflow version ───────────────────────────────────────────────────────────
airflowVersion: "3.2.2"

# ── Images ────────────────────────────────────────────────────────────────────
images:
  airflow:
    repository: apache/airflow
    tag: "3.2.2"
    pullPolicy: IfNotPresent

# ── Executor ──────────────────────────────────────────────────────────────────
executor: KubernetesExecutor

# ── External database ─────────────────────────────────────────────────────────
# Disable the bundled PostgreSQL pod entirely.
postgresql:
  enabled: false

# Connection string via pre-existing Secret — password never touches this file.
data:
  metadataSecretName: airflow-db-credentials

# ── Fernet key ────────────────────────────────────────────────────────────────
fernetKeySecretName: airflow-fernet-key

# ── Database migrations ───────────────────────────────────────────────────────
migrateDatabaseJob:
  enabled: true

# ── Redis (CeleryExecutor only) ───────────────────────────────────────────────
redis:
  enabled: false

# ── API Server (replaces webserver in Airflow 3.x) ───────────────────────────
apiServer:
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  extraVolumes:
    - name: datafiles
      persistentVolumeClaim:
        claimName: datafiles-nfs-pvc
  extraVolumeMounts:
    - name: datafiles
      mountPath: /opt/airflow/datafiles

# ── Scheduler ─────────────────────────────────────────────────────────────────
scheduler:
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1500m
      memory: 1.5Gi
  extraVolumes:
    - name: datafiles
      persistentVolumeClaim:
        claimName: datafiles-nfs-pvc
  extraVolumeMounts:
    - name: datafiles
      mountPath: /opt/airflow/datafiles      

# ── Triggerer ─────────────────────────────────────────────────────────────────
triggerer:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi

workers:
  kubernetes:
    extraVolumes:
      - name: datafiles
        persistentVolumeClaim:
          claimName: datafiles-nfs-pvc
    extraVolumeMounts:
      - name: datafiles
        mountPath: /opt/airflow/datafiles      

# ── Logs & Storage Ephemeral Tuning ──────────────────────────────────────────
# persistence.enabled: false means each pod gets its own emptyDir for /opt/airflow/logs,
# so there's no shared/busy root device to isolate against — no subPath needed.
logs:
  persistence:
    enabled: false

# ── DAG deployment via git-sync ───────────────────────────────────────────────
dags:
  gitSync:
    enabled: true
    repo: https://github.com/jefferycutler/my-datahub.git
    branch: main
    rev: HEAD
    depth: 1
    maxFailures: 3
    subPath: "airflow/dags"
    period: 300s    # 5 min — polite to GitHub, fine for non-time-critical DAG deploys

# ── Ingress ───────────────────────────────────────────────────────────────────
# Airflow 3.x uses ingress.apiServer instead of ingress.web
ingress:
  apiServer:
    enabled: true
    ingressClassName: traefik
    path: "/"
    pathType: ImplementationSpecific
    hosts:
      - name: airflow.k8spr.area51
        tls:
          enabled: true
          secretName: ""    # use Traefik's default cert
      - name: airflow.k8spr
        tls:
          enabled: true
          secretName: ""    # use Traefik's default cert
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"