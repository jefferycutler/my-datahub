---
- name: Install and configure auditd for security monitoring
  hosts: all:!registry
  become: yes
  gather_facts: yes
  vars_files:
    - "secrets.yaml"

  tasks:
    - name: Configure auditd for Debian-based systems
      block:
        - name: Ensure .ssh dir exists for admin user audit watching
          ansible.builtin.file:
            path: "/home/{{ admin_user }}/.ssh"
            state: directory
            mode: '0700'
            owner: "{{ admin_user }}"
            group: "{{ admin_user }}"

        - name: Install auditd and audisp-syslog plugin
          ansible.builtin.apt:
            name:
              - auditd
              - audispd-plugins
            state: present
            update_cache: yes

        - name: Deploy audit rules for standard hosts
          ansible.builtin.template:
            src: templates/auditd.rules.j2
            dest: /etc/audit/rules.d/90-security.rules
            owner: root
            group: root
            mode: '0640'
          when: "'k8work' not in group_names"
          notify: restart auditd

        - name: Deploy audit rules for k8s workers (host-only)
          ansible.builtin.template:
            src: templates/auditd.rules.k8work.j2
            dest: /etc/audit/rules.d/90-security.rules
            owner: root
            group: root
            mode: '0640'
          when: "'k8work' in group_names"
          notify: restart auditd

        - name: Deploy audisp syslog plugin config
          ansible.builtin.template:
            src: templates/audisp-syslog.conf.j2
            dest: /etc/audit/plugins.d/syslog.conf
            owner: root
            group: root
            mode: '0640'
          notify: restart auditd

        - name: Ensure auditd is started and enabled
          ansible.builtin.systemd:
            name: auditd
            state: started
            enabled: yes

      when: ansible_facts['os_family'] == "Debian"

  handlers:
    - name: restart auditd
      ansible.builtin.command:
        cmd: /sbin/auditctl -R /etc/audit/rules.d/90-security.rules
